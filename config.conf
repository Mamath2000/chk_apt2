# apt_mqtt configuration file (shell-compatible KEY=VALUE)
# Candidate locations (checked in order):
#   /etc/apt_mqtt/config.conf
#   $HOME/.config/apt_mqtt/config.conf
#   <repo>/apt_mqtt/config.conf
#
# - Edit values below to match your environment.
# - Protect this file if it contains credentials: `chmod 600 config.conf`.

# MQTT broker settings
MQTT_BROKER=192.168.100.190
MQTT_PORT=1883
MQTT_USERNAME=
MQTT_PASSWORD=

# MQTT topics / discovery
MQTT_BASE_TOPIC=home/apt
OBJECT_ID=apt_update
MQTT_CLIENT_ID=apt_mqtt_$(hostname -s)

# Daemon behavior
CHECK_INTERVAL=3600
DAEMON_PATH=/root/chk_apt2/apt_mqtt/apt_mqtt_daemon.sh
LOGFILE=/var/log/apt_mqtt.log

# Upgrade behaviour (used as documentation / placeholders)
# AUTO_UPGRADE: if true, the daemon could trigger automatic upgrades (not enabled by default)
# ASSUME_YES: if true, pass -y to apt-get (the script already uses -y when performing upgrades)
# FULL_UPGRADE: if true, prefer dist-upgrade (may remove packages)
# AUTOREMOVE: if true, run apt-get autoremove after upgrade

AUTO_UPGRADE=false
ASSUME_YES=true
FULL_UPGRADE=false
AUTOREMOVE=false
